<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyricat</title>
  <!-- Optional: web fonts when network allows; layout still works with system fallbacks in @theme. -->
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,800;1,9..144,700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    /* Do not set margin/padding on * here — unlayered rules override @layer utilities
       and would zero out all Tailwind spacing (px-4, gap, grid, etc.). Preflight in
       bundled Tailwind already resets in @layer base; utilities then apply correctly. */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      background: transparent !important;
    }

    body {
      background: transparent !important;
      font-family: 'DM Sans', sans-serif;
    }

    /* Marquee container — clips the scrolling text */
    .marquee-wrap {
      overflow: hidden;
      white-space: nowrap;
    }

    /* Text starts as inline-block so scrollWidth is measurable */
    .marquee-wrap>* {
      display: inline-block;
      white-space: nowrap;
      max-width: none;
    }

    /* Auth link click area */
    #authLink {
      word-break: break-all;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>

<body class="animate-slide-up w-[290px] overflow-visible px-[11px] pt-2" oncontextmenu="return false;">

  <!-- Now-Playing card (hidden when unauthenticated) -->
  <div id="mainCard" class="w-[268px] rounded-2xl"
    style="background:#FDFAF5; border:1.5px solid rgba(0,0,0,0.09); box-shadow:0 8px 32px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.06);">

    <!-- Header -->
    <div class="px-4 pt-[14px] pb-3" style="border-bottom:1px solid rgba(0,0,0,0.06);">

      <div class="flex items-center justify-between mb-[10px]">

        <!-- Now Playing chip -->
        <div class="inline-flex items-center gap-1.5 rounded-full px-[10px] py-[3px] pl-2"
          style="border:1px solid rgba(255,107,107,0.3);">
          <span class="w-1.5 h-1.5 rounded-full shrink-0 inline-block" style="background:#FF6B6B;"></span>
          <span class="text-[9px] font-bold uppercase tracking-[0.18em] pt-px" style="color:#FF6B6B;">
            Now Playing
          </span>
        </div>

        <!-- Romanized toggle -->
        <label class="flex items-center gap-1.5 cursor-pointer select-none">
          <span class="text-[9px] font-semibold uppercase tracking-[0.14em]" style="color:rgba(30,20,10,0.45);">
            Romanized
          </span>

          <div class="relative">
            <input id="romanToggle" type="checkbox" class="sr-only" checked>
            <div class="w-7 h-4 rounded-full transition" style="background:rgba(0,0,0,0.15);" id="romanTrack"></div>

            <div class="absolute top-[2px] left-[2px] w-3 h-3 rounded-full bg-white shadow transition" id="romanThumb">
            </div>
          </div>
        </label>
      </div>
      <!-- Song name — marquee container -->
      <div class="marquee-wrap">
        <h2 id="song" class="font-display text-[21px] font-black leading-tight" style="color:#1A1208;">Loading...</h2>
      </div>

      <!-- Artist name — marquee container -->
      <div class="marquee-wrap mt-[3px]">
        <p id="artist" class="text-[11.5px] font-medium" style="color:rgba(30,20,10,0.38);">Waiting for Spotify...</p>
      </div>
    </div>

    <!-- Buttons grid -->
    <div class="grid grid-cols-2 gap-1.5 p-[10px]">

      <button onclick="openLyrics('genius')"
        class="flex items-center justify-between rounded-xl px-[10px] py-[9px] min-w-0 transition-all duration-150 active:opacity-75"
        style="background:#FFF8E7; border:1.5px solid rgba(245,185,0,0.28);"
        onmouseover="this.style.background='#FFF0C0';this.style.borderColor='rgba(245,185,0,0.65)'"
        onmouseout="this.style.background='#FFF8E7';this.style.borderColor='rgba(245,185,0,0.28)'">
        <span class="text-[12px] font-semibold truncate" style="color:#1A1208;">Genius</span>
        <svg class="opacity-20 shrink-0 ml-1" width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

      <button onclick="openLyrics('colorcoded')"
        class="flex items-center justify-between rounded-xl px-[10px] py-[9px] min-w-0 transition-all duration-150 active:opacity-75"
        style="background:#FFF0F3; border:1.5px solid rgba(255,100,130,0.22);"
        onmouseover="this.style.background='#FFE0E8';this.style.borderColor='rgba(255,100,130,0.55)'"
        onmouseout="this.style.background='#FFF0F3';this.style.borderColor='rgba(255,100,130,0.22)'">
        <span class="text-[12px] font-semibold truncate" style="color:#1A1208;">ColorCoded</span>
        <svg class="opacity-20 shrink-0 ml-1" width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

      <button onclick="openLyrics('az')"
        class="flex items-center justify-between rounded-xl px-[10px] py-[9px] min-w-0 transition-all duration-150 active:opacity-75"
        style="background:#EFF6FF; border:1.5px solid rgba(80,160,255,0.22);"
        onmouseover="this.style.background='#DDEEFF';this.style.borderColor='rgba(80,160,255,0.55)'"
        onmouseout="this.style.background='#EFF6FF';this.style.borderColor='rgba(80,160,255,0.22)'">
        <span class="text-[12px] font-semibold truncate" style="color:#1A1208;">AZLyrics</span>
        <svg class="opacity-20 shrink-0 ml-1" width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

      <button onclick="openLyrics('musixmatch')"
        class="flex items-center justify-between rounded-xl px-[10px] py-[9px] min-w-0 transition-all duration-150 active:opacity-75"
        style="background:#F0FBF4; border:1.5px solid rgba(80,200,120,0.22);"
        onmouseover="this.style.background='#DCFAE6';this.style.borderColor='rgba(80,200,120,0.55)'"
        onmouseout="this.style.background='#F0FBF4';this.style.borderColor='rgba(80,200,120,0.22)'">
        <span class="text-[12px] font-semibold truncate" style="color:#1A1208;">Musixmatch</span>
        <svg class="opacity-20 shrink-0 ml-1" width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

    </div>
  </div>

  <!-- First-run / sign-in card (hidden when authenticated) -->
  <div id="loginCard" class="w-[268px] rounded-2xl hidden"
    style="background:#FDFAF5; border:1.5px solid rgba(0,0,0,0.09); box-shadow:0 8px 32px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.06);">

    <div class="px-4 pt-[16px] pb-[14px] flex flex-col gap-3">

      <!-- Lyricat logo / brand -->
      <div class="flex items-center gap-2">
        <span class="text-[13px] font-display font-black" style="color:#1A1208;">Lyricat</span>
        <span class="text-[9px] font-bold uppercase tracking-[0.18em] rounded-full px-2 py-[2px]"
          style="background:rgba(255,107,107,0.12); color:#FF6B6B; border:1px solid rgba(255,107,107,0.28);">
          Not connected
        </span>
      </div>

      <!-- Prompt text -->
      <div>
        <p class="text-[12.5px] font-semibold leading-snug" style="color:#1A1208;">
          Connect your Spotify account
        </p>
        <p class="text-[11px] mt-[3px]" style="color:rgba(30,20,10,0.45);">
          Sign in so Lyricat can see what you're playing and find lyrics instantly.
        </p>
      </div>

      <!-- Sign in button -->
      <button id="spotifySignInBtn"
        class="w-full flex items-center justify-center gap-2 rounded-xl py-[9px] font-semibold text-[12.5px] transition-all duration-150 active:opacity-80"
        style="background:#1DB954; color:#fff; border:none;" onmouseover="this.style.background='#1ed760'"
        onmouseout="this.style.background='#1DB954'">
        <!-- Spotify icon (simplified) -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
          <path
            d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" />
        </svg>
        Sign in with Spotify
      </button>
      <p id="authStatus" class="text-[10.5px] leading-snug hidden" style="color:#CC3A3A;"></p>

      <!-- Divider -->
      <div class="flex items-center gap-2">
        <div class="flex-1 h-px" style="background:rgba(0,0,0,0.07);"></div>
        <span class="text-[9px] font-semibold uppercase tracking-widest" style="color:rgba(30,20,10,0.3);">or open link
          manually</span>
        <div class="flex-1 h-px" style="background:rgba(0,0,0,0.07);"></div>
      </div>

      <!-- Fallback copy link button (populated by JS) -->
      <button id="authLinkBtn"
        class="w-full flex items-center justify-center gap-2 rounded-xl py-[8px] font-semibold text-[11.5px] transition-all duration-150 active:opacity-80"
        style="background:rgba(0,0,0,0.04); color:rgba(30,20,10,0.6); border:1px solid rgba(0,0,0,0.06);"
        onmouseover="this.style.background='rgba(0,0,0,0.06)'" onmouseout="this.style.background='rgba(0,0,0,0.04)'">
        <svg id="copyIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" class="opacity-60">
          <path
            d="M8 4V16C8 17.1046 8.89543 18 10 18H20C21.1046 18 22 17.1046 22 16V4C22 2.89543 21.1046 2 20 2H10C8.89543 2 8 2.89543 8 4Z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M16 18V20C16 21.1046 15.1046 22 14 22H4C2.89543 22 2 21.1046 2 20V8C2 6.89543 2.89543 6 4 6H6"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span id="authLinkText">Copy login link</span>
      </button>

    </div>
  </div>

  <!-- Caret -->
  <div class="relative h-[9px] -mt-px">
    <svg id="caret-svg" width="16" height="9" viewBox="0 0 16 9" fill="none" class="absolute -translate-x-1/2"
      style="left:145px;">
      <path d="M1 0 L8 8 L15 0 Z" fill="#FDFAF5" stroke="rgba(0,0,0,0.09)" stroke-width="1.5" stroke-linejoin="round" />
      <line x1="0" y1="0.75" x2="16" y2="0.75" stroke="#FDFAF5" stroke-width="1.5" />
    </svg>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    window.setCaret = function (x) {
      document.getElementById('caret-svg').style.left = x + 'px';
    };
    document.fonts.ready.then(() => {
      console.log('[lyricat] body.scrollHeight =', document.body.scrollHeight);
    });
  </script>
</body>

</html>
