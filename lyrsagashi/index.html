<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyrics Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,800;1,9..144,700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'serif'],
            sans: ['DM Sans', 'sans-serif'],
          },
          keyframes: {
            slideUp: {
              from: { opacity: '0', transform: 'translateY(8px) scale(0.97)' },
              to: { opacity: '1', transform: 'translateY(0) scale(1)' },
            },
          },
          animation: {
            slideUp: 'slideUp 0.2s cubic-bezier(0.22,1,0.36,1) both',
          },
        }
      }
    }
  </script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Every level must be transparent — Tailwind preflight, webview defaults, all of it */
    html {
      background: transparent !important;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: transparent !important;
      /* Fixed width matching tauri window, NO height constraint — let content be natural */
      width: 290px;
      /* Padding: top gap + side margins. Bottom=0, caret handles its own space */
      padding: 8px 11px 0 11px;
      overflow: visible;
    }
  </style>
</head>

<body class="animate-slideUp">

  <!-- Card: explicit width so it never overflows -->
  <div id="card" style="
    width: 268px;
    background: #FDFAF5;
    border: 1.5px solid rgba(0,0,0,0.09);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  ">

    <!-- Header -->
    <div style="padding: 14px 16px 12px 16px; border-bottom: 1px solid rgba(0,0,0,0.06);">

      <!-- Now Playing chip -->
      <div style="
        display: inline-flex; align-items: center; gap: 6px;
        border: 1px solid rgba(255,107,107,0.3);
        border-radius: 999px;
        padding: 3px 10px 3px 8px;
        margin-bottom: 10px;
      ">
        <span
          style="width:6px;height:6px;border-radius:50%;background:#FF6B6B;flex-shrink:0;display:inline-block;"></span>
        <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:#FF6B6B;">Now
          Playing</span>
      </div>

      <h2 class="font-display"
        style="font-size:21px;font-weight:900;color:#1A1208;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
        Golden Hour</h2>
      <p
        style="font-size:11.5px;font-weight:500;color:rgba(30,20,10,0.38);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
        JVKE &nbsp;·&nbsp; 2022</p>
    </div>

    <!-- Buttons 2x2 grid -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px;">

      <button onclick="open('https://genius.com/search?q=Golden+Hour+JVKE')"
        style="display:flex;align-items:center;gap:8px;border-radius:12px;padding:9px 10px;background:#FFF8E7;border:1.5px solid rgba(245,185,0,0.28);cursor:pointer;transition:background 0.15s,border-color 0.15s;min-width:0;"
        onmouseover="this.style.background='#FFF0C0';this.style.borderColor='rgba(245,185,0,0.65)'"
        onmouseout="this.style.background='#FFF8E7';this.style.borderColor='rgba(245,185,0,0.28)'"
        onmousedown="this.style.opacity='0.75'" onmouseup="this.style.opacity='1'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
          <circle cx="12" cy="12" r="12" fill="#FFD234" />
          <text x="12" y="17" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="13"
            fill="#1A1A1A">G</text>
        </svg>
        <span
          style="font-size:12px;font-weight:600;color:#1A1208;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Genius</span>
        <svg style="margin-left:auto;opacity:0.22;flex-shrink:0" width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

      <button onclick="open('https://colorcodedlyrics.com/?s=Golden+Hour+JVKE')"
        style="display:flex;align-items:center;gap:8px;border-radius:12px;padding:9px 10px;background:#FFF0F3;border:1.5px solid rgba(255,100,130,0.22);cursor:pointer;transition:background 0.15s,border-color 0.15s;min-width:0;"
        onmouseover="this.style.background='#FFE0E8';this.style.borderColor='rgba(255,100,130,0.55)'"
        onmouseout="this.style.background='#FFF0F3';this.style.borderColor='rgba(255,100,130,0.22)'"
        onmousedown="this.style.opacity='0.75'" onmouseup="this.style.opacity='1'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
          <circle cx="12" cy="12" r="12" fill="#FF6B8A" />
          <circle cx="9" cy="10" r="2.2" fill="white" opacity="0.95" />
          <circle cx="15" cy="10" r="2.2" fill="white" opacity="0.95" />
          <circle cx="12" cy="15.5" r="2.2" fill="white" opacity="0.95" />
        </svg>
        <span
          style="font-size:12px;font-weight:600;color:#1A1208;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">ColorCoded</span>
        <svg style="margin-left:auto;opacity:0.22;flex-shrink:0" width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

      <button onclick="open('https://search.azlyrics.com/search.php?q=Golden+Hour+JVKE')"
        style="display:flex;align-items:center;gap:8px;border-radius:12px;padding:9px 10px;background:#EFF6FF;border:1.5px solid rgba(80,160,255,0.22);cursor:pointer;transition:background 0.15s,border-color 0.15s;min-width:0;"
        onmouseover="this.style.background='#DDEEFF';this.style.borderColor='rgba(80,160,255,0.55)'"
        onmouseout="this.style.background='#EFF6FF';this.style.borderColor='rgba(80,160,255,0.22)'"
        onmousedown="this.style.opacity='0.75'" onmouseup="this.style.opacity='1'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
          <rect width="24" height="24" rx="6" fill="#4FA8FF" />
          <text x="12" y="16.5" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="10"
            fill="white" letter-spacing="-0.5">AZ</text>
        </svg>
        <span
          style="font-size:12px;font-weight:600;color:#1A1208;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">AZLyrics</span>
        <svg style="margin-left:auto;opacity:0.22;flex-shrink:0" width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

      <button onclick="open('https://www.musixmatch.com/search/Golden+Hour+JVKE')"
        style="display:flex;align-items:center;gap:8px;border-radius:12px;padding:9px 10px;background:#F0FBF4;border:1.5px solid rgba(80,200,120,0.22);cursor:pointer;transition:background 0.15s,border-color 0.15s;min-width:0;"
        onmouseover="this.style.background='#DCFAE6';this.style.borderColor='rgba(80,200,120,0.55)'"
        onmouseout="this.style.background='#F0FBF4';this.style.borderColor='rgba(80,200,120,0.22)'"
        onmousedown="this.style.opacity='0.75'" onmouseup="this.style.opacity='1'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
          <rect width="24" height="24" rx="6" fill="#4CC870" />
          <path d="M8 17V10l8-2.5V14" stroke="white" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round" />
          <circle cx="8" cy="17" r="2.2" fill="white" />
          <circle cx="16" cy="14" r="2.2" fill="white" />
        </svg>
        <span
          style="font-size:12px;font-weight:600;color:#1A1208;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Musixmatch</span>
        <svg style="margin-left:auto;opacity:0.22;flex-shrink:0" width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

    </div>
  </div>

  <!-- Caret: x position set dynamically by Rust via window.setCaret() -->
  <div id="caret-row" style="position:relative;height:9px;margin-top:-1px;">
    <svg id="caret-svg" width="16" height="9" viewBox="0 0 16 9" fill="none"
      style="position:absolute;left:145px;transform:translateX(-50%);">
      <path d="M1 0 L8 8 L15 0 Z" fill="#FDFAF5" stroke="rgba(0,0,0,0.09)" stroke-width="1.5" stroke-linejoin="round" />
      <line x1="0" y1="0.75" x2="16" y2="0.75" stroke="#FDFAF5" stroke-width="1.5" />
    </svg>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    window.setCaret = function (x) {
      document.getElementById('caret-svg').style.left = x + 'px';
    };
    document.fonts.ready.then(() => {
      console.log('[lyrsagashi] body.scrollHeight =', document.body.scrollHeight);
    });
  </script>
</body>

</html>
