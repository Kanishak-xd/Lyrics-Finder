<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyrics Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,800;1,9..144,700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'serif'],
            sans: ['DM Sans', 'sans-serif'],
          },
          keyframes: {
            slideUp: {
              from: { opacity: '0', transform: 'translateY(10px) scale(0.96)' },
              to: { opacity: '1', transform: 'translateY(0) scale(1)' },
            },
          },
          animation: {
            slideUp: 'slideUp 0.22s cubic-bezier(0.22,1,0.36,1) both',
          },
        }
      }
    }
  </script>
  <style>
    /* Reset everything that could cause scroll */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      font-family: 'DM Sans', sans-serif;
      background: transparent;
      overflow: hidden;
      /* no scroll ever */
      width: 290px;
      height: 310px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      /* widget sits at bottom, caret at very bottom */
      padding: 0 11px 11px 11px;
      /* breathing room on sides + bottom for caret */
    }
  </style>
</head>

<body>
  <div class="animate-slideUp">

    <!-- Card -->
    <div class="rounded-2xl overflow-hidden"
      style="background:#FDFAF5; border:1.5px solid rgba(0,0,0,0.08); box-shadow:0 16px 48px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.07);">

      <!-- Header -->
      <div class="px-4 pt-4 pb-3" style="border-bottom:1px solid rgba(0,0,0,0.06);">

        <!-- Now Playing chip -->
        <div class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 mb-3"
          style="border:1px solid rgba(255,107,107,0.25);">
          <span class="w-1.5 h-1.5 rounded-full shrink-0" style="background:#FF6B6B;"></span>
          <span class="text-[9.5px] font-bold uppercase tracking-[0.18em]" style="color:#FF6B6B;">Now Playing</span>
        </div>

        <!-- Song info -->
        <h2 class="font-display text-[21px] font-black leading-tight truncate" style="color:#1A1208;">Golden Hour</h2>
        <p class="text-[11.5px] font-medium mt-0.5 truncate" style="color:rgba(30,20,10,0.38);">JVKE &nbsp;·&nbsp; 2022
        </p>
      </div>

      <!-- Buttons -->
      <div class="grid grid-cols-2 gap-1.5 p-3">

        <button onclick="open('https://genius.com/search?q=Golden+Hour+JVKE')"
          class="group flex items-center gap-2.5 rounded-xl px-3 py-2.5 transition-all duration-150 active:scale-95"
          style="background:#FFF8E7; border:1.5px solid rgba(245,185,0,0.25);"
          onmouseover="this.style.background='#FFF0C0';this.style.borderColor='rgba(245,185,0,0.6)'"
          onmouseout="this.style.background='#FFF8E7';this.style.borderColor='rgba(245,185,0,0.25)'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="12" fill="#FFD234" />
            <text x="12" y="17" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="13"
              fill="#1A1A1A">G</text>
          </svg>
          <span class="text-[12px] font-semibold" style="color:#1A1208;">Genius</span>
          <svg class="ml-auto opacity-25 group-hover:opacity-60 transition-opacity" width="11" height="11"
            viewBox="0 0 12 12" fill="none">
            <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>

        <button onclick="open('https://colorcodedlyrics.com/?s=Golden+Hour+JVKE')"
          class="group flex items-center gap-2.5 rounded-xl px-3 py-2.5 transition-all duration-150 active:scale-95"
          style="background:#FFF0F3; border:1.5px solid rgba(255,100,130,0.2);"
          onmouseover="this.style.background='#FFE0E8';this.style.borderColor='rgba(255,100,130,0.5)'"
          onmouseout="this.style.background='#FFF0F3';this.style.borderColor='rgba(255,100,130,0.2)'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="12" fill="#FF6B8A" />
            <circle cx="9" cy="10" r="2.2" fill="white" opacity="0.95" />
            <circle cx="15" cy="10" r="2.2" fill="white" opacity="0.95" />
            <circle cx="12" cy="15.5" r="2.2" fill="white" opacity="0.95" />
          </svg>
          <span class="text-[12px] font-semibold" style="color:#1A1208;">ColorCoded</span>
          <svg class="ml-auto opacity-25 group-hover:opacity-60 transition-opacity" width="11" height="11"
            viewBox="0 0 12 12" fill="none">
            <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>

        <button onclick="open('https://search.azlyrics.com/search.php?q=Golden+Hour+JVKE')"
          class="group flex items-center gap-2.5 rounded-xl px-3 py-2.5 transition-all duration-150 active:scale-95"
          style="background:#EFF6FF; border:1.5px solid rgba(80,160,255,0.2);"
          onmouseover="this.style.background='#DDEEFF';this.style.borderColor='rgba(80,160,255,0.5)'"
          onmouseout="this.style.background='#EFF6FF';this.style.borderColor='rgba(80,160,255,0.2)'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect width="24" height="24" rx="6" fill="#4FA8FF" />
            <text x="12" y="16.5" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="10"
              fill="white" letter-spacing="-0.5">AZ</text>
          </svg>
          <span class="text-[12px] font-semibold" style="color:#1A1208;">AZLyrics</span>
          <svg class="ml-auto opacity-25 group-hover:opacity-60 transition-opacity" width="11" height="11"
            viewBox="0 0 12 12" fill="none">
            <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>

        <button onclick="open('https://www.musixmatch.com/search/Golden+Hour+JVKE')"
          class="group flex items-center gap-2.5 rounded-xl px-3 py-2.5 transition-all duration-150 active:scale-95"
          style="background:#F0FBF4; border:1.5px solid rgba(80,200,120,0.2);"
          onmouseover="this.style.background='#DCFAE6';this.style.borderColor='rgba(80,200,120,0.5)'"
          onmouseout="this.style.background='#F0FBF4';this.style.borderColor='rgba(80,200,120,0.2)'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect width="24" height="24" rx="6" fill="#4CC870" />
            <path d="M8 17V10l8-2.5V14" stroke="white" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round" />
            <circle cx="8" cy="17" r="2.2" fill="white" />
            <circle cx="16" cy="14" r="2.2" fill="white" />
          </svg>
          <span class="text-[12px] font-semibold" style="color:#1A1208;">Musixmatch</span>
          <svg class="ml-auto opacity-25 group-hover:opacity-60 transition-opacity" width="11" height="11"
            viewBox="0 0 12 12" fill="none">
            <path d="M2 10L10 2M10 2H5M10 2V7" stroke="#1A1208" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>

      </div>
    </div>

    <!-- Caret — points down toward tray icon -->
    <div class="flex justify-end pr-4">
      <div class="w-3 h-3 rotate-45 -mt-[7px]"
        style="background:#FDFAF5; border-right:1.5px solid rgba(0,0,0,0.08); border-bottom:1.5px solid rgba(0,0,0,0.08);">
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
